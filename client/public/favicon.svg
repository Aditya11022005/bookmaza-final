<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background Gradient (Elegant Purple/Indigo) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B31CB" />
      <stop offset="100%" stop-color="#580B94" />
    </linearGradient>
    
    <!-- Gold/Amber Pages Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
  </defs>

  <!-- Background Card -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- Stylized Book Icon -->
  <g transform="translate(64, 80)">
    <!-- Book Shadow/Outline -->
    <path d="M48 300 C120 270, 192 280, 192 310 C192 280, 264 270, 336 300 L336 80 C264 50, 192 60, 192 90 C192 60, 120 50, 48 80 Z" fill="rgba(0, 0, 0, 0.15)" />
    
    <!-- Left Page (White) -->
    <path d="M48 280 C120 250, 192 260, 192 290 L192 70 C192 40, 120 30, 48 60 Z" fill="#FFFFFF" />
    
    <!-- Right Page (Amber/Gold) -->
    <path d="M192 290 C192 260, 264 250, 336 280 L336 60 C264 30, 192 40, 192 70 Z" fill="url(#goldGrad)" />
    
    <!-- Stylized Bookmark Ribbon -->
    <path d="M180 70 L204 70 L204 310 L192 295 L180 310 Z" fill="#EF4444" />
    
    <!-- Abstract page lines on Left Page -->
    <path d="M80 110 H160 M80 150 H160 M80 190 H160 M80 230 H130" stroke="#E2E8F0" stroke-width="8" stroke-linecap="round" />
    
    <!-- Abstract page lines on Right Page -->
    <path d="M224 110 H304 M224 150 H304 M224 190 H304 M254 230 H304" stroke="#FEE2E2" stroke-width="8" stroke-linecap="round" opacity="0.3" />
  </g>
</svg>